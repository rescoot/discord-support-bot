id: aux
title:
  de: "AUX-Batterie / Roller wacht nicht auf"
  en: "AUX battery / scooter won't wake"
description:
  de: |-
    Geführte Fehlersuche bei wackeligem Aufwachen, toten LEDs und App-Verbindungsproblemen.
  en: |-
    Guided troubleshoot for flaky wake-ups, dead LEDs and app connection problems.
start: age

steps:
  age:
    prompt:
      de: "Wie alt ist dein unu-Roller?"
      en: "How old is your unu scooter?"
    choices:
      - label: { de: "< 2 Jahre", en: "< 2 years" }
        goto: symptoms
      - label: { de: "2–4 Jahre", en: "2–4 years" }
        goto: aux-suspect
      - label: { de: "> 4 Jahre", en: "> 4 years" }
        goto: aux-very-suspect

  aux-very-suspect:
    prompt:
      de: "Bei Rollern über 4 Jahre ist die AUX fast immer am Ende. Willst du trotzdem messen?"
      en: "On 4+ year scooters the AUX is almost always done. Measure anyway?"
    choices:
      - label: { de: "Ja, Spannung messen", en: "Yes, measure voltage" }
        goto: measure
      - label: { de: "Nein, direkt tauschen", en: "No, just swap it" }
        goto: replace

  aux-suspect:
    prompt:
      de: "Die AUX ist der übliche Verdächtige. Misst du die Ruhespannung?"
      en: "AUX is the usual suspect. Will you measure resting voltage?"
    choices:
      - label: { de: "Messen", en: "Measure" }
        goto: measure
      - label: { de: "Anderes Symptom beschreiben", en: "Describe other symptom" }
        goto: symptoms

  symptoms:
    prompt:
      de: "Was passiert beim Wecken?"
      en: "What happens when you try to wake the scooter?"
    choices:
      - label: { de: "Gar nichts (keine LED, kein Piep)", en: "Nothing (no LED, no beep)" }
        goto: nothing
      - label: { de: "Grüne LED aus, App zeigt „wacht auf", en: "Green LED off, app says \"waking up\"" }
        goto: measure
      - label: { de: "Dashboard startet kurz und geht wieder aus", en: "Dashboard briefly starts then dies" }
        goto: brownout
      - label: { de: "App kann sich nicht verbinden", en: "App can't connect" }
        goto: app-flow

  nothing:
    prompt:
      de: "Keycard probiert? Liest das Dashboard sie (LED-Reaktion)?"
      en: "Tried the keycard? Does the dashboard read it (LED reaction)?"
    choices:
      - label: { de: "Keine Reaktion auf Keycard", en: "No reaction to keycard" }
        goto: measure
      - label: { de: "Keycard wird gelesen, Roller geht trotzdem aus", en: "Keycard is read, scooter still dies" }
        goto: brownout

  measure:
    prompt:
      de: "Miss die AUX-Ruhespannung (Multimeter direkt an den Polen)."
      en: "Measure AUX resting voltage (multimeter on the posts)."
    choices:
      - label: { de: "> 12,4 V", en: "> 12.4 V" }
        goto: under-load
      - label: { de: "11,8–12,4 V", en: "11.8–12.4 V" }
        goto: under-load
      - label: { de: "< 11,8 V", en: "< 11.8 V" }
        goto: replace

  under-load:
    prompt:
      de: "Schalte die Blinker ein und miss erneut. Bricht die Spannung ein?"
      en: "Turn on the blinkers and measure again. Does voltage sag?"
    choices:
      - label: { de: "Ja, stark (< 11 V)", en: "Yes, a lot (< 11 V)" }
        goto: replace
      - label: { de: "Nein, stabil", en: "No, stable" }
        goto: wiring

  wiring:
    answer:
      de: |
        AUX scheint ok. Jetzt Verkabelung prüfen:
        • Pluspol-Kontakt (Korrosion, lockere Schraube)
        • DC-Wandler-Stecker (fest, nicht verbrannt)
        • Masse zum Rahmen
        Wenn alles sauber aussieht und der Roller trotzdem nicht aufwacht,
        poste im `#roller-support` mit Fotos und den gemessenen Spannungen.
      en: |
        AUX looks fine. Now check the wiring:
        • + post contact (corrosion, loose screw)
        • DC converter plug (tight, not burned)
        • Ground to the frame
        If everything looks clean and the scooter still won't wake, post in
        `#roller-support` with photos and the voltages you measured.

  brownout:
    answer:
      de: |
        Klassisches AUX-Brownout-Symptom: AUX hat noch Ruhespannung, bricht
        aber unter Last komplett weg. → AUX tauschen.
        Sicherheitshinweis: `/faq dc-converter-safety` vor dem Arbeiten lesen.
      en: |
        Classic AUX brownout: AUX has resting voltage but collapses under
        load. → Replace the AUX.
        Safety: read `/faq dc-converter-safety` before working on electrics.

  replace:
    answer:
      de: |
        AUX ist tot. Ersatz ist eine 12V-Blei-Gel-Batterie passender Größe
        (Community-Doku im `#ressourcen`-Kanal).
        ⚠️ **Hauptakku rausnehmen**, bevor du irgendwas ziehst.
        Siehe `/faq dc-converter-safety` und `/faq aux-battery`.
      en: |
        AUX is dead. Replace with a matching 12V gel lead-acid (see the
        community docs in `#ressourcen`).
        ⚠️ **Remove the main battery** before unplugging anything.
        See `/faq dc-converter-safety` and `/faq aux-battery`.
    links:
      - url: https://github.com/Julinho666/UNU-CBB-Battery
        label: { de: "CBB/AUX Community-Doku", en: "CBB/AUX community docs" }

  app-flow:
    answer:
      de: |
        Wenn der Roller physisch aufwacht (LED, Dashboard), aber die App
        nicht verbindet, siehe `/diagnose app` oder `/faq app-connect`.
      en: |
        If the scooter wakes physically (LED, dashboard) but the app can't
        connect, see `/diagnose app` or `/faq app-connect`.
