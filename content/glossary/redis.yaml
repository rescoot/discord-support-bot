id: redis
aliases: [inter-process, ipc]
title:
  de: "Redis — Interne Kommunikation"
  en: "Redis — internal messaging"
body:
  de: |
    Auf dem MDB läuft ein **Redis**-Server (192.168.7.1:6379), über den alle
    Services kommunizieren. Zustände landen in Hashes (`vehicle`, `battery:0`,
    `engine-ecu`, `gps`, …), Events in Pub/Sub-Channels.

    Für Debug-Sessions ist das der beste Einstiegspunkt:
    `redis-cli -h 192.168.7.1 monitor`.
  en: |
    The MDB runs a **Redis** server (192.168.7.1:6379) that all services talk
    through. State lives in hashes (`vehicle`, `battery:0`, `engine-ecu`,
    `gps`, …), events in pub/sub channels.

    Best entry point for debug sessions:
    `redis-cli -h 192.168.7.1 monitor`.
tags: [software, architecture]
