id: hauptakku
aliases: [fahrakku, main-battery, battery, akku]
title:
  de: "Hauptakku / Fahrakku"
  en: "Main battery"
body:
  de: |
    Der **Hauptakku** (im Channel oft „Fahrakku") ist der große,
    herausnehmbare Lithium-Akku, der den Motor antreibt. Pro Roller
    passen zwei rein.

    Grunddaten:
    - 14s7p, 21700er Zellen
    - 50,8 V nominell, bis 58,2 V beim Laden
    - 35 Ah / ~1778 Wh
    - LED-Ring oben auf dem Akku zeigt den Ladestand an. Bei Fehlern
      blinkt er.
    - Datenübertragung zum Roller läuft über NFC (deshalb die B32/B33-
      Fehler beim Aktivieren — siehe `/faq battery-errors`).

    Der Hauptakku treibt den Motor über die ECU. Die Steuerelektronik
    (MDB/DBC/Licht) hängt nicht direkt am Hauptakku — siehe
    `/glossar aux` und `/glossar cbb` für die 12-V-Versorgung.

    Siehe auch `/glossar ecu`.
  en: |
    The **main battery** ("Fahrakku" in-channel) is the big removable
    lithium pack that drives the motor. The scooter takes two.

    Basics:
    - 14s7p, 21700 cells
    - 50.8 V nominal, up to 58.2 V while charging
    - 35 Ah / ~1778 Wh
    - LED ring on top of the battery shows charge level. Blinks on
      faults.
    - Data link to the scooter is NFC (which is why activation faults
      come back as B32/B33 — see `/faq battery-errors`).

    The main battery drives the motor through the ECU. The control
    electronics (MDB/DBC/lights) don't run directly off it — see
    `/glossary aux` and `/glossary cbb` for the 12 V supply.

    See also `/glossary ecu`.
tags: [hardware, battery]
