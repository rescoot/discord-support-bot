id: cbb
aliases: [connectivity-box-battery, innenbatterie, internal-battery]
title:
  de: "CBB — Connectivity Box Battery"
  en: "CBB — Connectivity Box Battery"
body:
  de: |
    Die **Connectivity Box Battery (CBB)** ist ein kleiner Li-Ion-Akku,
    der Mobilfunk/GPS auch dann versorgt, wenn der Hauptakku nicht aktiv
    oder raus ist. Der Roller schaltet im Standby zwischen AUX und CBB um,
    je nachdem, was aktiv ist.

    Typisches Symptom einer leeren CBB: die App meldet „internal battery
    low"; in dem Moment ist die CBB nicht mehr verbunden. Wenn zusätzlich
    AUX und CBB beide leer sind, lässt sich der Roller nicht mehr starten.

    Community-Doku und Reverse-Engineering:
    <https://github.com/Julinho666/UNU-CBB-Battery>.
  en: |
    The **Connectivity Box Battery (CBB)** is a small Li-ion pack that
    keeps cellular/GPS alive when the main battery is inactive or removed.
    In standby the scooter switches between AUX and CBB depending on
    what's active.

    Typical dead-CBB symptom: the app shows "internal battery low"; at
    that moment the CBB is no longer connected. If AUX *and* CBB are both
    empty, the scooter won't start.

    Community docs / reverse engineering:
    <https://github.com/Julinho666/UNU-CBB-Battery>.
    (Repo URL includes the original maintainer's GitHub handle.)
