id: keycard
aliases: [nfc-key, nfc-keycard, schlüsselkarte]
title:
  de: "Keycard — NFC-Schlüssel"
  en: "Keycard — NFC key"
body:
  de: |
    Die **Keycard** ist eine NFC-Karte, mit der der Roller freigeschaltet
    wird. Gelesen wird sie vom PN7150-NFC-Chip im DBC; eine LP5662-LED im
    Dashboard zeigt Lese-Zustand und Fehler an.
  en: |
    The **keycard** is an NFC card that unlocks the scooter. A PN7150 NFC
    chip inside the DBC reads it, and an LP5662 LED on the dashboard shows
    read state and errors.
tags: [hardware, auth]
