id: mdb
aliases: [middle-driver-board, middledriverboard]
title:
  de: "MDB — Middle Driver Board"
  en: "MDB — Middle Driver Board"
body:
  de: |
    Das **Middle Driver Board (MDB)** ist die zentrale Steuerplatine des unu Scooter Pro.
    Es koordiniert Motorsteuerung, Stromverteilung und die Kommunikation zwischen allen
    anderen Systemen. Über ein SIM7100E-Modul stellt es auch die Mobilfunk-Verbindung her.

    Technisch erreichbar unter **192.168.7.1** (USB-Ethernet vom DBC aus),
    Redis läuft auf Port 6379.
  en: |
    The **Middle Driver Board (MDB)** is the central control board of the unu Scooter Pro.
    It coordinates motor control, power distribution and communication between all other
    systems. A SIM7100E module provides cellular connectivity.

    Reachable at **192.168.7.1** (USB-ethernet from the DBC), with Redis on port 6379.
