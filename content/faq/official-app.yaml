id: official-app
aliases: [unu-app, app-server, server-down, abschaltung, registrieren, login, unustasis, emco-app]
title:
  de: "Welche App nutze ich noch?"
  en: "Which app do I still use?"
body:
  de: |
    Die alte unu-App geht noch, solange du auf deinem aktuellen Handy
    verbunden und eingeloggt bist. Bei einem Handywechsel oder einer
    Neuinstallation klappt das Login aber nicht mehr — die Server sind
    seit unus Pleite aus.

    Solange das alte Setup noch läuft, **jetzt umsteigen** ist die
    sichere Variante. Zwei Apps, beide ohne Cloud, beide reine
    BLE-Verbindung zum Roller:

    **unustasis** (empfohlen, Community/FOSS):
    - Android: <https://play.google.com/store/apps/details?id=de.freal.unustasis>
    - iOS: aktuell nur über TestFlight,
      <https://testflight.apple.com/join/Uzcy1kSH>
    - Quellcode: <https://github.com/reunu/unustasis>

    **unu by Emco** (von Emco veröffentlichte Variante, abgeleitet von
    unustasis):
    - Android: <https://play.google.com/store/apps/details?id=com.unumotors.ossapp>
    - iOS: <https://apps.apple.com/app/unu-by-emco/id6566196417>

    Beide sprechen den Roller lokal über Bluetooth an, kein Login, kein
    Internet (siehe `/faq app-connect`). Wenn du noch in der alten
    Original-App steckst: deinstallieren, eine der beiden installieren,
    fertig. Der alte Account bringt dir nichts mehr — die SIM im Roller
    ist seit Server-Abschaltung ohnehin tot.
  en: |
    The original unu app still works as long as you're already logged
    in and paired on your current phone. Switch phones or reinstall and
    the login won't go through any more — the servers have been off
    since unu's bankruptcy.

    While the old setup still runs, **switch now** is the safe move.
    Two apps, both cloud-free, both BLE-only:

    **unustasis** (recommended, community / FOSS):
    - Android: <https://play.google.com/store/apps/details?id=de.freal.unustasis>
    - iOS: currently TestFlight only,
      <https://testflight.apple.com/join/Uzcy1kSH>
    - Source: <https://github.com/reunu/unustasis>

    **unu by Emco** (Emco's published version, derived from unustasis):
    - Android: <https://play.google.com/store/apps/details?id=com.unumotors.ossapp>
    - iOS: <https://apps.apple.com/app/unu-by-emco/id6566196417>

    Both talk to the scooter locally over Bluetooth, no login, no
    internet (see `/faq app-connect`). If you're still on the original
    app: uninstall, install one of the above, done. Your old account is
    worth nothing anyway — the SIM in the scooter has been dead since
    the servers went off.
