id: display-repair
aliases: [display, dbc-display, glas, kleben, dashboard-repair]
title:
  de: "Display-Glas wieder aufs DBC kleben"
  en: "Re-glueing the display glass to the DBC"
body:
  de: |
    Aus dem Channel: **3M 468MP** doppelseitiges Klebeband kommt dem
    Original sehr nahe und ist (mit etwas Geduld) auch wieder ablösbar,
    wenn man das Display nochmal aufmachen muss.

    Altes Kleberrückstände am Glas lassen sich mit den üblichen Lösern
    (Isopropanol bzw. etikettenverträglicher Cleaner) entfernen — hier gab
    es im Channel keinen festen Standard-Tipp, also vorsichtig testen.

    Beim Zusammenbau: keine Kabel unter dem Glas einklemmen.
  en: |
    From the channel: **3M 468MP** double-sided tape is close to the
    original and (with patience) also removable if you need to open the
    dashboard again.

    Residual adhesive on the glass comes off with the usual solvents
    (isopropanol or label-safe cleaner) — no single agreed-on recipe was
    posted in the channel, so test carefully.

    On reassembly: don't pinch cables under the glass.
tags: [repair, dashboard]
