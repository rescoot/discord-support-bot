id: display-repair
aliases: [display, dbc-display, glas, kleben, dashboard-repair]
title:
  de: "Display-Glas wieder aufs DBC kleben"
  en: "Re-glueing the display glass to the DBC"
body:
  de: |
    Aus dem `#roller-support` (Zanooda, mehrfach bestätigt von Julinho):
    **3M 468MP** ist der passende Kleber — kommt dem Original sehr nahe
    und ist ablösbar, falls man das Display später nochmal öffnen muss.

    Zum DBC-Ausbau (erollerberlin_jLn): Displaycover ist aufgeklebt — ab
    nehmen, dahinter sind **4 Schrauben**. Front ab, USB-Kabel zum MDB
    lösen, Stecker abziehen. Beim Wiederzusammenbau keine Kabel unter
    dem Glas einklemmen.

    Altkleber-Rückstände gehen i. d. R. mit Isopropanol oder ähnlichem ab
    — hier gab's keinen festen Standard-Tipp, also vorsichtig testen.
  en: |
    From `#roller-support` (Zanooda, confirmed repeatedly by Julinho):
    **3M 468MP** is the right tape — close to the original and removable
    if you need to open the display again later.

    To pull the DBC (per erollerberlin_jLn): the display cover is glued —
    take it off, **4 screws** are underneath. Remove the front, unplug
    the USB cable to the MDB. On reassembly, don't pinch cables under the
    glass.

    Old adhesive residue usually comes off with isopropanol or similar —
    no single agreed recipe was posted, so test carefully.
tags: [repair, dashboard]
