id: firmware
aliases: [update, version, scooteros, stock-firmware]
title:
  de: "Stock-Firmware-Versionen"
  en: "Stock firmware versions"
body:
  de: |
    Im Channel erwähnte unu ScooterOS-Versionen (chronologisch):
    V1.5.0, V1.6.0, V1.8.0, V1.12.0, V1.13.2, **V1.15.0**.

    V1.15.0 ist nach Aussage im Channel der letzte Release-Candidate für
    MDB und DBC und dürfte die letzte offizielle Version sein, die unu
    selbst herausgegeben hat.

    Seit unus Pleite gibt es keine neuen offiziellen Roller-Firmwares —
    Weiterentwicklung findet unter **LibreScoot** statt
    (`/glossar librescoot`), die Firmware ist dort aber aktuell noch in
    Entwicklung und *nicht als stabil* bezeichnet.
  en: |
    unu ScooterOS versions mentioned in the channel (chronological):
    V1.5.0, V1.6.0, V1.8.0, V1.12.0, V1.13.2, **V1.15.0**.

    Per channel statements V1.15.0 is the last release candidate for MDB
    and DBC and is probably the last official version unu itself shipped.

    Since unu's bankruptcy there are no new official scooter firmwares.
    Continued development happens under **LibreScoot**
    (`/glossary librescoot`), though that firmware is still in development
    and is *not yet described as stable*.
tags: [firmware]
