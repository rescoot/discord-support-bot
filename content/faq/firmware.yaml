id: firmware
aliases: [update, version, scooteros, stock-firmware, nrf]
title:
  de: "Stock-Firmware: Soll-Versionen"
  en: "Stock firmware: target versions"
body:
  de: |
    Das sind die letzten offiziellen Stände, die ein Roller drauf haben
    sollte:

    • **MDB:** V1.15.0
    • **DBC:** V1.15.0 (oder die aktuellste gesehene — faktisch 1.15.0)
    • **nRF:** V1.12.0

    Wenn dein Roller ältere Versionen zeigt, ist das ein Grund, sich
    beim **Verkäufer** zu melden und den offiziellen Update-Stand
    nachzufordern — nicht etwas, das man selbst nachbessern muss.

    Neue offizielle Firmwares wird es nicht mehr geben; für
    Weiterentwicklung siehe **LibreScoot** (`/glossar librescoot`).
  en: |
    These are the last official builds a scooter should be running:

    • **MDB:** V1.15.0
    • **DBC:** V1.15.0 (or the newest seen — effectively 1.15.0)
    • **nRF:** V1.12.0

    If your scooter shows older versions, that's a reason to go back to
    whoever **sold** it and ask for the official update — not something
    you have to sort out yourself.

    No new official firmwares will be released; for continued development
    see **LibreScoot** (`/glossary librescoot`).
tags: [firmware]
