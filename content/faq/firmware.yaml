id: firmware
aliases: [update, version, scooteros, stock-firmware, nrf]
title:
  de: "Stock-Firmware: Soll-Versionen"
  en: "Stock firmware: target versions"
body:
  de: |
    Letzter offizieller Stand auf einem unu Pro:

    - **MDB:** v1.15.0
    - **DBC:** v1.15.0
    - **nRF:** v1.12.0

    Alles, was älter ist, ist zu alt. Solche Roller verbinden sich oft
    gar nicht mehr per Bluetooth, haben Bugs und Dinge funktionieren
    schlicht nicht.

    Versionen am Roller ablesen: bei eingeschaltetem Roller beide
    Bremshebel mindestens 5 s halten, dann erscheint die Versionsbox.

    Wenn deins älter ist:

    - Technisch versierte Nutzer:innen kann man durchs Update walken —
      meld dich im `#support`.
    - Sonst lieber zur **Werkstatt** (`/faq service-partner`).
    - Oder gleich auf **LibreScoot** umsteigen
      (`/faq librescoot-intro`).

    Neue offizielle Firmwares kommen nicht mehr — die Server sind aus.
  en: |
    Last official build on a unu Pro:

    - **MDB:** v1.15.0
    - **DBC:** v1.15.0
    - **nRF:** v1.12.0

    Anything older is too old. Those scooters often won't connect over
    Bluetooth at all, have bugs, and things just don't work.

    To read the versions on the scooter: with the scooter on, hold
    both brake levers for at least 5 s — the Versionsbox appears.

    If yours is older:

    - Technically inclined users can be walked through the update —
      ask in `#support`.
    - Otherwise, take it to a **workshop** (`/faq service-partner`).
    - Or just switch to **LibreScoot** (`/faq librescoot-intro`).

    No new official firmwares are coming — the servers are off.
tags: [firmware]
