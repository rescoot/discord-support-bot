id: spare-parts
aliases: [ersatzteile, parts, reparatur]
title:
  de: "Ersatzteile und Reverse-Engineering-Ressourcen"
  en: "Spare parts and reverse-engineering resources"
body:
  de: |
    Seit der unu-Pleite gibt es keinen offiziellen Teile-Shop mehr. Teile
    sind meist Eigen- oder Community-Beschaffung.

    **Was die Community hat:**
    • **Reverse-Engineering & Schaltpläne:** `#reverse-engineering`
    • **Doku zum CBB-Akku (Julinho):**
      <https://github.com/Julinho666/UNU-CBB-Battery>
    • **LibreScoot (Firmware-/Service-Quelltext):**
      <https://github.com/librescoot>
    • **Weitere Links:** Kanal `#ressourcen`, angepinnte Posts in
      `#roller-support`.

    Für konkrete Teile am besten direkt in `#roller-support` fragen — mit
    genauer Beschreibung (wo, was, ggf. Foto).
  en: |
    Since the unu bankruptcy there is no official parts shop. Parts mostly
    come from DIY or community.

    **What the community has:**
    • **Reverse engineering & schematics:** `#reverse-engineering`
    • **CBB battery docs (Julinho):**
      <https://github.com/Julinho666/UNU-CBB-Battery>
    • **LibreScoot (firmware/service source):**
      <https://github.com/librescoot>
    • **More links:** `#ressourcen` channel, pinned posts in
      `#roller-support`.

    For specific parts, ask directly in `#roller-support` with a clear
    description (location, part, photo if possible).
