id: librescoot-intro
aliases: [open-firmware, custom-firmware, flashen, free-firmware]
title:
  de: "Was ist LibreScoot?"
  en: "What is LibreScoot?"
body:
  de: |
    **LibreScoot** ist eine alternative, offene Firmware für den unu
    Scooter Pro. Sie befindet sich laut Channel-Status aktuell noch in
    Entwicklung und **ist noch nicht als stabil bezeichnet**.

    LibreScoot hat nichts mit der offiziellen unu-App zu tun — die App
    greift weiterhin auf die unu-Cloud zu, LibreScoot ersetzt nur die
    Firmware auf dem Roller.

    Infos & Code:
    • Tech-Reference: <https://github.com/reunu/tech-reference>
    • LibreScoot-Repos: <https://github.com/librescoot>
    • Diskussion: `#librescoot-talk`

    Wenn du überlegst zu flashen, lies dich bitte vorher in die Doku ein
    und frag im `#librescoot-talk`-Channel — gefragt wird dort regelmäßig.
  en: |
    **LibreScoot** is an alternative, open firmware for the unu Scooter
    Pro. Per channel status it's currently still in development and is
    **not yet described as stable**.

    LibreScoot is unrelated to the official unu app — the app still hits
    the unu cloud; LibreScoot only replaces firmware on the scooter.

    Info & code:
    • Tech reference: <https://github.com/reunu/tech-reference>
    • LibreScoot repos: <https://github.com/librescoot>
    • Discussion: `#librescoot-talk`

    If you're thinking about flashing, read the docs first and ask in
    `#librescoot-talk` — it comes up regularly there.
