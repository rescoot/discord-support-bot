id: librescoot-intro
aliases: [open-firmware, custom-firmware, flashen, free-firmware, installer]
title:
  de: "Was ist LibreScoot?"
  en: "What is LibreScoot?"
body:
  de: |
    **LibreScoot** ist die offene, community-entwickelte Firmware für
    den unu Scooter Pro.

    **Status:** Noch nicht als stabil freigegeben — aber nicht mehr weit
    davon entfernt. Technisch versierte Nutzer:innen können über den
    **Installer** den **Testing-Channel** installieren; für die breite
    Masse wird das im Moment **nicht empfohlen**. Also: lieber ein bisschen
    warten, bis es offiziell freigegeben wird.

    LibreScoot hat nichts mit der offiziellen unu-App zu tun — die App
    spricht die Cloud, LibreScoot ersetzt nur die Firmware auf dem Roller.

    Code und Doku:
    • <https://github.com/librescoot>
    • Tech-Reference: <https://github.com/reunu/tech-reference>
  en: |
    **LibreScoot** is the open, community-developed firmware for the unu
    Scooter Pro.

    **Status:** not yet released as stable — but not far off. Technically
    proficient users can install the **testing channel** via the
    **installer**; for the general audience this is **not recommended
    right now**. Better to wait for an official stable release.

    LibreScoot is unrelated to the official unu app — the app talks to
    the cloud; LibreScoot only replaces firmware on the scooter.

    Code and docs:
    • <https://github.com/librescoot>
    • Tech reference: <https://github.com/reunu/tech-reference>
tags: [librescoot, software]
