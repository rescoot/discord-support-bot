id: service-partner
aliases: [werkstatt, reparaturdienst, mechaniker]
title:
  de: "Werkstatt / Service-Partner finden"
  en: "Finding a workshop / service partner"
body:
  de: |
    Seit der unu-Pleite ist die Werkstatt-Landschaft dünn und
    regional. Strategie im Channel ist meistens:

    **In `#roller-support` mit Postleitzahl/Region fragen.** Wer gerade
    was anbietet, wechselt — die aktive Community weiß das am besten.

    **Einzige explizit genannte Werkstatt** (aus dem Support-Channel):
    • **Berlin:** *Fa. Wilhelm Fahrzeugtechnik* am Südkreuz — im Channel
      beschrieben als „*die* unu-Werkstatt in Berlin".

    Für Firmware/Software-Fragen ist eher `#librescoot-talk` der richtige
    Ort.
  en: |
    Since the unu bankruptcy the workshop landscape is thin and regional.
    The channel's default approach:

    **Ask in `#roller-support` with your zip code / region.** Who's
    currently offering what changes; the active community tracks it.

    **Only workshop named explicitly** (from the support channel):
    • **Berlin:** *Fa. Wilhelm Fahrzeugtechnik* near Südkreuz — described
      in the channel as "*the* unu workshop in Berlin".

    Firmware/software questions: `#librescoot-talk`.
tags: [service, community]
