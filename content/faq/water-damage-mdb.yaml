id: water-damage-mdb
aliases: [wasser, wasserschaden, wassereintritt, feuchtigkeit, korrosion, mdb-usb]
title:
  de: "Wassereintritt am MDB"
  en: "Water ingress at the MDB"
body:
  de: |
    **Sehr häufiger Folgeschaden an älteren Rollern.** Der MDB-Schacht
    im Trittbrett liegt offen genug, dass Wasser regelmäßig dort
    landet — durch Kondenswasser, Regen während der Fahrt oder (immer
    wieder beobachtet) **Hochdruckreinigung** (das ist nie eine gute
    Idee, lass es).

    Im Schacht trifft das Wasser auf die USB-B-Buchse zwischen MDB und
    DBC und das MDB selbst. Das Resultat sind korrodierte Kontakte und
    oft auch Schäden am Board dahinter.

    Aus dem `#roller-support`:
    > „Leider liegt das ziemlich oft an Wassereintritt am MDB —
    > konstruktionsbedingt kanns in die USB-Buchse ziemlich gut rein
    > und gammelt dann fröhlich im MDB vor sich hin."

    **Typische Symptome:**
    • DBC geht gar nicht mehr an.
    • DBC kommt hoch, zeigt aber keine Daten vom MDB
      (Geschwindigkeit, Akkustand, Blinker-Status, …).
    • Roller geht nicht in den Fahrmodus.
    • Sporadische Aussetzer / Kommunikationsfehler MDB↔DBC.
    • Häufig nach längerem Draußenstehen ohne Abdeckung oder direkt
      nach einer Wäsche.

    **Sichtprüfung:** Trittbrettverkleidung ab, MDB-Schacht angucken —
    Wasserspuren, Salzränder, sichtbare Korrosion am Stecker oder am
    Board sind klare Hinweise. Im USB-Stecker ist die Korrosion oft
    auch zu sehen, auch wenn der typische grüne Kupferoxid-Belag eher
    bei den AUX-Steckern (A1/A2) auftritt.

    **Wenn das MDB ran muss — Reihenfolge fürs Trockenlegen:**
    1. **Hauptakku raus.**
    2. **Einen Pol der AUX abklemmen** (reicht).
    3. **CBB-Stecker abziehen.**
    4. Erst dann das MDB **komplett ausbauen** und in Ruhe öffnen,
       reinigen (99 %-Isopropanol), trocknen, prüfen, ob das Board
       überhaupt noch was tut.

    Den **DC-Wandler musst du dafür normalerweise nicht trennen** — und
    solltest es auch nicht, siehe `/faq dc-converter-safety`.

    Wenn das Board sichtbar grün korrodiert ist (nicht nur der
    Stecker), sind die Chancen auf eine Reanimation schlecht. Im
    `#roller-support` gibt's einen Community-Prüfservice, der MDBs in
    den Tester nimmt.

    **Vorbeugung:**
    • Roller abdecken oder drinnen parken, gerade im Winter.
    • **Nicht mit Hochdruckreiniger waschen.**
    • Eine **Dichtung an der Vorderseite des Trittbretts** anbringen
      (z. B. Fenster-/Türdichtung mit Kleberücken) — von unten an die
      Vorderkante des abnehmbaren Trittbrettteils kleben. Fängt einen
      großen Teil des einlaufenden Wassers ab.
  en: |
    **Very common failure on older scooters.** The MDB bay in the
    footrest sits exposed enough that water regularly ends up in it —
    from condensation, rain while riding, or (recurring story)
    **pressure washing** (don't, just don't).

    Once in the bay, water hits the USB-B socket between MDB and DBC
    and the MDB itself. The result is corroded contacts, and often
    damage to the board behind them.

    From `#roller-support`:
    > "Sadly it often comes down to water ingress at the MDB — the USB
    > socket has no proper seal, and it then happily corrodes away
    > inside the MDB."

    **Typical symptoms:**
    • DBC doesn't power on at all.
    • DBC powers up but never shows data from the MDB (speed, battery,
      turn-signal state, …).
    • Scooter won't enter drive mode.
    • Sporadic dropouts / MDB↔DBC communication errors.
    • Often after extended outdoor storage or right after a wash.

    **Visual check:** pull the footrest panel and look in the MDB bay —
    water marks, salt rings, visible corrosion on the connector or
    board are clear signs. The USB plug usually shows corrosion too,
    though the classic green copper-oxide deposit is more common on
    the AUX connectors (A1/A2).

    **If you need to get to the MDB — order of disconnects:**
    1. **Main battery out.**
    2. **Disconnect one pole of the AUX** (one is enough).
    3. **Disconnect the CBB.**
    4. Then **remove the MDB outright** and work on it on the bench:
       open it, clean (99 % isopropanol), dry, check whether the board
       is still alive.

    You **normally don't need to disconnect the DC converter** — and
    shouldn't, see `/faq dc-converter-safety`.

    If the board itself is visibly green/corroded (not just the
    connector) the chances of reviving it are poor. The
    `#roller-support` channel has a community test service that will
    put MDBs on a tester.

    **Prevention:**
    • Cover the scooter or park indoors, especially in winter.
    • **Don't pressure-wash it.**
    • Add a **gasket at the front of the footrest** (e.g. self-
      adhesive window/door seal) — stick it underneath the leading
      edge of the removable footrest panel. Catches a large share of
      the water that would otherwise run in.
tags: [hardware, water-damage, repair, mdb]
