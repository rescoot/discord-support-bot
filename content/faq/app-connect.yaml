id: app-connect
aliases: [app-verbindung, bluetooth, ble, app-funktioniert-nicht, wacht-auf, waking-up]
title:
  de: "App verbindet nicht / hängt bei „wacht auf"
  en: "App won't connect / stuck on \"waking up\""
body:
  de: |
    Die offizielle unu-App nutzt Bluetooth + Cloud, um den Roller zu wecken.
    Häufige Ursachen, wenn es hakt:

    1. **Hauptakku leer oder raus** — die CBB überbrückt zwar, aber wenn der
       Roller tief im Hibernate ist, kann das Wecken fehlschlagen.
    2. **AUX leer** → siehe `/faq aux-battery`.
    3. **Bluetooth-Cache** im Telefon: Bluetooth am Handy einmal aus/ein,
       App-Cache leeren, App neu starten.
    4. **iOS-Beta**: wenn die Prod-App zickt, hilft oft die TestFlight-Beta.
    5. **Roller-Firmware veraltet**: die letzten offiziellen Updates (V1.15)
       haben Wake-Bugs gefixt.

    **Wenn der Roller gar nicht reagiert:** physisch mit der Keycard wecken
    und prüfen, ob er aus eigener Kraft hochkommt. Wenn ja, ist die App
    wahrscheinlich der Knackpunkt. Wenn nein → AUX/CBB checken.

    👉 Interaktiv: `/diagnose app`
  en: |
    The official unu app uses Bluetooth + cloud to wake the scooter. Common
    reasons for stalls:

    1. **Main battery empty or removed** — the CBB bridges it, but if the
       scooter is deep in hibernate the wake can fail.
    2. **AUX dead** → see `/faq aux-battery`.
    3. **Bluetooth cache** on the phone: toggle BT off/on, clear app cache,
       restart the app.
    4. **iOS beta**: when the prod app misbehaves, the TestFlight beta often
       helps.
    5. **Outdated scooter firmware**: the last official updates (V1.15) fixed
       several wake bugs.

    **If the scooter doesn't react at all:** wake it physically with the
    keycard. If it comes up, the app is the problem. If not → check AUX/CBB.

    👉 Interactive: `/diagnose app`
