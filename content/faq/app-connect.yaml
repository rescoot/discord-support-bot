id: app-connect
aliases: [app-verbindung, bluetooth, ble, app-funktioniert-nicht]
title:
  de: "App verbindet nicht"
  en: "App won't connect"
body:
  de: |
    Was im Channel bestätigt ist:

    1. **Der Roller nutzt BLE (Bluetooth Low Energy).** Solange AUX *oder*
       CBB noch Spannung haben, ist BLE immer an — das ist nicht
       abschaltbar.
    2. **Der Roller kann nur mit einem Handy gleichzeitig verbunden sein.**
       Wenn die App nicht findet, hilft oft: am alten/zweiten Handy die
       Verbindung trennen oder das Handy ausschalten.
    3. **iOS-Beta (TestFlight)** behebt häufig Verbindungsprobleme der
       Prod-App.
    4. Wenn *gar nichts* passiert (weder App-Wake noch Keycard reagiert),
       ist es meist kein App-Problem, sondern **AUX/CBB leer** —
       siehe `/faq aux-battery`.

    **Erster Schritt zur Abgrenzung:** Keycard physisch ans Dashboard
    halten. Wacht der Roller auf? Dann liegt's an der App.
    Wacht er nicht auf? Dann an der Stromversorgung.

    👉 Interaktiv: `/diagnose app`
  en: |
    What's confirmed in the channel:

    1. **The scooter uses BLE (Bluetooth Low Energy).** As long as AUX
       *or* CBB has power, BLE stays on — it can't be turned off.
    2. **The scooter only pairs with one phone at a time.** If the app
       can't find it, disconnecting on an old/second phone (or switching
       it off) often fixes it.
    3. **iOS TestFlight beta** often fixes connection issues that exist
       in the production app.
    4. If *nothing* happens — neither app wake nor keycard reaction —
       it's usually not an app problem but **dead AUX/CBB** — see
       `/faq aux-battery`.

    **First step to narrow it down:** hold the keycard physically to the
    dashboard. Does the scooter wake? Then it's the app. No reaction?
    Then it's power.

    👉 Interactive: `/diagnose app`
