id: aux-battery
aliases: [aux, bleiakku, 12v, keine-grüne-led, wacht-nicht-auf]
title:
  de: "AUX-Batterie: Roller wacht nicht auf / kein grünes Licht"
  en: "AUX battery: scooter won't wake / no green light"
body:
  de: |
    **Typisches Bild:** Die App zeigt den Hauptakku voll, aber der Roller
    reagiert nicht auf Keycard/App, oder die grüne LED blinkt im
    „Master-Erwartungs-Modus" und kommt nicht weiter.

    In so gut wie allen Fällen, die hier im Channel aufgetaucht sind, war die
    **12V-AUX-Bleibatterie am Ende** — bei Rollern ab ~2 Jahren ist das die
    Standardursache. Typische Reparaturberichte:
    „AUX getauscht, startet einwandfrei."

    **Schnellcheck (ohne Werkzeug):** Halte die AUX-Taste in der unu-App
    lange gedrückt, solange der Roller verbunden ist — die App zeigt dir
    den AUX-Zustand. Bei sichtbar niedriger AUX-Spannung ist das Urteil
    eindeutig.

    **Weitere Anzeichen für eine schwache AUX:**
    • Dashboard geht beim Anschalten kurz an und wieder aus
    • Blinker funktionieren gar nicht oder flackern
    • Roller bleibt im Standby hängen

    **Fix:** AUX tauschen. Bauform und Maße so wie die Original-Batterie
    (12V-Blei-Gel). Frag im `#roller-support` nach konkret bewährten
    Ersatztypen — dort gibt es aktuelle Empfehlungen.

    ⚠️ **Wichtig:** Den Stecker des DC-Wandlers **nie** abziehen, solange
    der Hauptakku eingesetzt ist — siehe `/faq dc-converter-safety`.

    👉 Interaktiv: `/diagnose aux`
  en: |
    **Typical symptoms:** the app shows the main battery full, but the
    scooter doesn't react to keycard or app, or the green LED keeps blinking
    in "master waiting" mode without progressing.

    In nearly every case that's come up in the channel, the **12V AUX lead-
    acid battery was done** — on scooters around 2+ years old this is the
    default answer. Typical repair reports: "Swapped the AUX, starts fine."

    **Quick check (no tools):** With the scooter connected in the unu app,
    long-press the AUX button in the app — it shows you the AUX state.
    Clearly low? Verdict's in.

    **Other low-AUX signs:**
    • Dashboard briefly powers on then dies
    • Turn signals don't work or flicker
    • Scooter hangs in standby

    **Fix:** replace the AUX. Same form factor as the original (12V gel
    lead-acid). Ask in `#roller-support` for currently recommended
    replacements — people there track what still works.

    ⚠️ **Never** unplug the DC converter while the main battery is
    inserted — see `/faq dc-converter-safety`.

    👉 Interactive: `/diagnose aux`
