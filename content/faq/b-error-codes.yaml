id: b-error-codes
aliases: [b32, b33, b34, b35, batterie-fehler, battery-error, fehlercode-batterie]
title:
  de: "Batterie-Fehlercodes (B-Codes)"
  en: "Battery error codes (B-codes)"
body:
  de: |
    Im Roller beginnen Batterie-Fehlercodes mit **B**. Die Kürzel sind
    offiziell im unu-Wartungshandbuch dokumentiert — hier die häufigsten:

    **B32 — Battery not active**
    Akku reagiert nicht auf Scooter-Anfragen.
    → 30 Sekunden warten, dann Akku raus und um 180° drehen.

    **B33 — Battery activation failed**
    Roller kann den Akku nicht aktivieren. Oft elektrostatisch bedingt.
    → Warten, Akku raus und um 180° drehen.
    → **Wenn B33 wiederholt auftritt**, braucht der Roller die
    „Potenzialausgleichs-Leitung vom Sitz zum Rahmen" (Reparaturplan
    Kapitel 8.1) — diese nachzurüsten sollte die Werkstatt/der
    Service-Partner erledigen.

    **B34 / B35 — NFC / Kommunikationsfehler**
    Defekt am Batterie-NFC-Lesegerät, an der Verkabelung oder am Akku
    selbst. → Sporadisch: erst mal drehen + neu einsetzen. Dauerhaft:
    alternative Batterie probieren, sonst NFC-Leser tauschen.

    **B03 / B04 / B08 — Temperatur**
    Akku zu heiß (>65 °C / >110 °C) oder zu kalt (<-20 °C).
    → 30 min abkühlen lassen bzw. auf Raumtemperatur bringen.

    **B09 — Voltage too high** → Roller neu starten.
    **B11 — Voltage too low** → Akku laden.
    **B13 / B14 — Battery issue/protection** (hoher Entladestrom)
    → Akku 5 Minuten raus, dann wieder rein.

    **B05 / B06 — Battery damage** → Hauptbatterie-Austausch.

    Bei den „Austausch"-Codes: das ist keine DIY-Aufgabe, da ist ein
    Service-Partner dran (`/faq service-partner`).

    Quelle: unu GmbH Reparaturplan 2.X, Kapitel 5.2.
  en: |
    On the unu, battery error codes start with **B**. Codes are
    officially documented in the unu maintenance manual; the common
    ones:

    **B32 — Battery not active**
    Battery doesn't respond to scooter queries.
    → Wait 30 s, then remove the battery and rotate 180°.

    **B33 — Battery activation failed**
    Scooter can't activate the battery. Often caused by electrostatic
    discharge.
    → Wait, remove battery, rotate 180°.
    → **If B33 keeps coming back**, the scooter needs the
    "potential-equalisation cable from seat to frame" retrofit
    (Reparaturplan chapter 8.1) — that's a workshop/service-partner
    job.

    **B34 / B35 — NFC / communication error**
    Fault in the battery NFC reader, the wiring, or the battery itself.
    → Sporadic: rotate + reseat. Persistent: try an alternative
    battery, otherwise swap the NFC reader.

    **B03 / B04 / B08 — Temperature**
    Battery too hot (>65 °C / >110 °C) or too cold (<-20 °C).
    → Cool for 30 min or bring to room temperature.

    **B09 — Voltage too high** → restart the scooter.
    **B11 — Voltage too low** → charge the battery.
    **B13 / B14 — Battery issue/protection** (high discharge current)
    → Remove the battery for 5 min, then reinsert.

    **B05 / B06 — Battery damage** → main battery replacement.

    The "replacement" codes aren't a DIY job — that's service-partner
    territory (`/faq service-partner`).

    Source: unu GmbH Reparaturplan 2.X, chapter 5.2.
